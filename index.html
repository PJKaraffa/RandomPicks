<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Random Pull</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Random Pull</h1>

    <div class="card">
      <label for="fileInput">Upload CSV File</label>
      <input id="fileInput" type="file" accept=".csv">

      <label for="nameColumn">Name Column</label>
      <select id="nameColumn" disabled>
        <option value="">Upload a file first</option>
      </select>

      <label for="pullNumber">Number to Pull</label>
      <input id="pullNumber" type="number" min="1" value="1">

      <button id="pullButton" disabled>Pull Random Names</button>
      <button id="resetButton" class="secondary">Reset</button>

      <p id="message"></p>
    </div>

    <div class="card">
      <h2>Selected Names</h2>
      <ul id="selectedList">
        <li>No names selected yet.</li>
      </ul>
    </div>

    <div class="card">
      <h2>Previously Selected / Excluded</h2>
      <ul id="excludedList">
        <li>No excluded names.</li>
      </ul>

      <button id="restoreAllButton" class="secondary" disabled>
        Restore All
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
